<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Skateboard Game</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #111; margin: 0 auto; }
        #scoreBoard { position: absolute; top: 10px; left: 20px; color: white; font-size: 24px; }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 400;

let score = 0;
let gameActive = true;
let obstacles = [];
let frameCount = 0;

// Player/Robot Object (Original)
const robot = {
    x: 50,
    y: 300,
    width: 40,
    height: 40,
    dy: 0,
    jumpForce: 12,
    gravity: 0.6,
    grounded: false
};

function drawRobot() {
    // 1. THRUST EFFECT (Sirf jump ke waqt piche se cyan bubbles)
    if (!robot.grounded) {
        ctx.fillStyle = "cyan";
        for(let i = 0; i < 4; i++) {
            ctx.beginPath();
            ctx.arc(robot.x - 8, robot.y + 35 + (Math.random() * 10), 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // 2. SKATEBOARD (Robot ke pairon ki jagah)
    ctx.fillStyle = "#333";
    ctx.fillRect(robot.x - 10, robot.y + 35, 60, 8); // Board
    
    // Wheels (Neon Pink)
    ctx.fillStyle = "#ff00ff";
    ctx.beginPath();
    ctx.arc(robot.x, robot.y + 43, 5, 0, Math.PI * 2);
    ctx.arc(robot.x + 40, robot.y + 43, 5, 0, Math.PI * 2);
    ctx.fill();

    // 3. YOUR ORIGINAL ROBOT (Grey square body)
    ctx.fillStyle = "#888"; 
    ctx.fillRect(robot.x, robot.y, 40, 35); 
    
    // Eye/Visor
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(robot.x + 20, robot.y + 8, 20, 6); 
}

function update() {
    if (!gameActive) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    // Gravity Logic
    robot.y += robot.dy;
    if (robot.y + robot.height < 350) {
        robot.dy += robot.gravity;
        robot.grounded = false;
    } else {
        robot.y = 350 - robot.height;
        robot.dy = 0;
        robot.grounded = true;
    }

    // Ground Line
    ctx.strokeStyle = "#555";
    ctx.beginPath();
    ctx.moveTo(0, 358);
    ctx.lineTo(canvas.width, 358);
    ctx.stroke();

    drawRobot();

    // Obstacles logic (Simple Red Boxes)
    if (frameCount % 90 === 0) {
        obstacles.push({ x: canvas.width, y: 325, width: 25, height: 25 });
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= 6;
        ctx.fillStyle = "red";
        ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);

        // Collision Check
        if (robot.x < obstacles[i].x + 25 && robot.x + 40 > obstacles[i].x &&
            robot.y < obstacles[i].y + 25 && robot.y + 40 > obstacles[i].y) {
            gameActive = false;
            alert("Game Over! Score: " + score);
            location.reload();
        }

        if (obstacles[i].x < -30) {
            obstacles.splice(i, 1);
            score++;
            document.getElementById("scoreBoard").innerText = "Score: " + score;
        }
    }
    requestAnimationFrame(update);
}

window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && robot.grounded) {
        robot.dy = -robot.jumpForce;
    }
});

update();
</script>
</body>
</html>
