<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Galaxy Skater - Bhavishya Kumar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; overflow: hidden; background: #02020a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Orbitron', sans-serif; }
        
        /* Mobile Responsive Canvas */
        canvas { 
            max-width: 100vw; 
            max-height: 100vh; 
            border: 2px solid #00f2ff; 
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); 
            border-radius: 10px; 
            background: #000;
        }
        
        .overlay { 
            position: absolute; 
            width: 100%; 
            max-width: 400px; 
            height: 100%; 
            max-height: 600px; 
            background: radial-gradient(circle, rgba(0,20,40,0.98) 0%, rgba(2,2,10,1) 100%); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            z-index: 100; 
            text-align: center; 
            color: white; 
            padding: 20px;
        }

        /* Modern Neon Logo */
        .logo-wrap { position: relative; width: 120px; height: 120px; margin-bottom: 10px; animation: float 4s ease-in-out infinite; }
        .skater-icon { 
            width: 70px; height: 70px; border: 5px solid #00f2ff; border-right-color: transparent; 
            border-radius: 50%; position: absolute; top: 15px; left: 25px;
            box-shadow: 0 0 20px #00f2ff; transform: rotate(-20deg);
        }
        .skater-icon::after {
            content: ''; position: absolute; width: 90px; height: 8px; background: #ff00ff;
            bottom: -15px; left: -10px; border-radius: 10px; box-shadow: 0 0 20px #ff00ff;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        h1 { font-size: 24px; margin: 5px 0; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; }
        .developer-tag { font-size: 10px; letter-spacing: 3px; color: #ff00ff; margin-bottom: 25px; font-weight: 900; text-shadow: 0 0 10px #ff00ff; animation: track 3s infinite alternate; }
        @keyframes track { from { letter-spacing: 3px; } to { letter-spacing: 5px; } }

        .btn { 
            background: #00f2ff; color: #000; padding: 15px 0; border: none; font-family: 'Orbitron'; font-weight: 900; 
            cursor: pointer; margin: 8px; border-radius: 8px; transition: 0.3s; 
            font-size: 14px; width: 85%; max-width: 250px; box-shadow: 0 5px 0 #008ba3;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        #robot-name-input { 
            background: rgba(255,255,255,0.05); border: 2px solid #ff00ff; color: #fff; padding: 10px; 
            font-family: 'Orbitron'; text-align: center; border-radius: 8px; width: 80%; max-width: 210px; 
            font-size: 16px; margin-top: 5px; animation: pulseGlow 2s infinite;
        }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 5px #ff00ff; } 50% { box-shadow: 0 0 15px #ff00ff; } }

        #score-ui { position: absolute; top: 15px; color: #00f2ff; font-size: 24px; font-weight: 900; z-index: 5; text-shadow: 0 0 10px #00f2ff; }
    </style>
</head>
<body>

    <div id="start-screen" class="overlay">
        <div class="logo-wrap"><div class="skater-icon"></div></div>
        <h1>GALAXY SKATER</h1>
        <div class="developer-tag">BY BHAVISHYA KUMAR</div>
        <div style="width: 100%;">
            <p style="font-size: 9px; color: #00f2ff; margin-bottom: 5px;">ROBOT ID:</p>
            <input type="text" id="robot-name-input" maxlength="12">
        </div>
        <br>
        <button class="btn" onclick="startGame()">START GAME</button>
    </div>

    <div id="death-screen" class="overlay" style="display: none;">
        <h2 style="color:#ff00ff;">SYSTEM CRASHED</h2>
        <p>SCORE: <span id="current-score-text" style="color:#00f2ff">0</span></p>
        <button id="revive-btn" class="btn" style="background:#ff00ff; color:white; box-shadow: 0 5px 0 #b300b3;" onclick="startAdTimer()">REVIVE</button>
        <button class="btn" onclick="hardReset()">RETRY</button>
        <button class="btn" style="background:#222; color:#00f2ff; font-size: 10px; box-shadow: 0 5px 0 #000;" onclick="goToMainMenu()">MENU</button>
        
        <div id="ad-box" style="display:none">
            <p>REBOOTING...</p>
            <div id="timer-num" style="font-size: 40px; color: #fff;">3</div>
        </div>
    </div>

    <div id="score-ui">000</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const deathScreen = document.getElementById("death-screen");
const nameInput = document.getElementById("robot-name-input");

// Mobile scaling
function resize() {
    let scale = Math.min(window.innerWidth / 400, window.innerHeight / 600);
    canvas.style.width = (400 * scale) + "px";
    canvas.style.height = (600 * scale) + "px";
}
window.addEventListener('resize', resize);
resize();

canvas.width = 400;
canvas.height = 600;

let customRobotName = localStorage.getItem("galaxyRobotName") || "Robot-X";
nameInput.value = customRobotName;

let gravity = 0.35;
let jump = -7.5;
let robot = { x: 70, y: 250, w: 40, h: 35, velY: 0, trail: [], thrustActive: 0 };
let obstacles = [], stars = [], frame = 0, score = 0, gameOver = false, gameRunning = false, canRevive = true;

for(let i=0; i<60; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, s: Math.random()*2 });

function startGame() {
    customRobotName = nameInput.value.trim() || "Robot-X";
    localStorage.setItem("galaxyRobotName", customRobotName);
    startScreen.style.display = "none";
    gameRunning = true;
    hardReset();
}

function goToMainMenu() { deathScreen.style.display = "none"; startScreen.style.display = "flex"; gameRunning = false; }

function handleInput(e) {
    if (!gameRunning || gameOver) return;
    e.preventDefault();
    robot.velY = jump;
    robot.thrustActive = 10;
}

// Touch + Click + Space
window.addEventListener("keydown", (e) => { if(e.code === "Space") handleInput(e); });
canvas.addEventListener("touchstart", handleInput, {passive: false});
canvas.addEventListener("mousedown", handleInput);

function triggerGameOver() {
    if (gameOver) return;
    gameOver = true;
    document.getElementById("current-score-text").innerText = score;
    deathScreen.style.display = "flex";
    document.getElementById("revive-btn").style.display = (canRevive && score > 0) ? "inline-block" : "none";
}

function startAdTimer() {
    document.getElementById("revive-btn").parentElement.style.display = "none";
    document.getElementById("ad-box").style.display = "block";
    let t = 3;
    let inv = setInterval(() => {
        t--; document.getElementById("timer-num").innerText = t;
        if(t <= 0) { clearInterval(inv); revivePlayer(); }
    }, 1000);
}

function revivePlayer() {
    deathScreen.style.display = "none";
    document.getElementById("ad-box").style.display = "none";
    robot.y = 250; robot.velY = 0; obstacles = []; gameOver = false; canRevive = false;
}

function hardReset() {
    deathScreen.style.display = "none";
    score = 0; document.getElementById("score-ui").innerText = "000";
    robot.y = 250; robot.velY = 0; robot.trail = []; obstacles = []; frame = 0; gameOver = false; canRevive = true;
}

function update() {
    if(!gameRunning || gameOver) return;
    robot.velY += gravity;
    robot.y += robot.velY;
    robot.trail.push({x: robot.x, y: robot.y + 25, type: robot.thrustActive > 0 ? 'thrust' : 'normal'});
    if(robot.trail.length > 15) robot.trail.shift();
    if(robot.thrustActive > 0) robot.thrustActive--;
    
    if(frame % 95 === 0) {
        let gap = 180;
        let pos = Math.random() * (canvas.height - gap - 140) + 70;
        obstacles.push({ x: canvas.width, top: pos, bottom: pos + gap, w: 60, passed: false });
    }
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= (3 + score * 0.1);
        if(robot.x + 10 < obstacles[i].x + obstacles[i].w && robot.x + robot.w - 10 > obstacles[i].x && (robot.y + 5 < obstacles[i].top || robot.y + robot.h - 5 > obstacles[i].bottom)) triggerGameOver();
        if(!obstacles[i].passed && obstacles[i].x < robot.x) { score++; obstacles[i].passed = true; document.getElementById("score-ui").innerText = score.toString().padStart(3, '0'); }
        if(obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
    }
    if(robot.y + robot.h > canvas.height || robot.y < -50) triggerGameOver();
    frame++;
}

function draw() {
    ctx.fillStyle = "#02020a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff";
    stars.forEach(s => { s.x -= s.s * 0.5; if(s.x < 0) s.x = canvas.width; ctx.fillRect(s.x, s.y, s.size, s.size); });
    
    if(!gameRunning) { requestAnimationFrame(draw); return; }

    robot.trail.forEach((t, i) => {
        ctx.fillStyle = t.type === 'thrust' ? `rgba(255, 255, 255, ${i/15})` : `rgba(0, 242, 255, ${i/15})`;
        ctx.beginPath(); ctx.arc(t.x, t.y, i/3, 0, Math.PI*2); ctx.fill();
    });

    obstacles.forEach(o => {
        ctx.shadowBlur = 10; ctx.shadowColor = "#ff00ff";
        ctx.fillStyle = "rgba(255, 0, 255, 0.2)";
        ctx.fillRect(o.x, 0, o.w, o.top);
        ctx.fillRect(o.x, o.bottom, o.w, canvas.height - o.bottom);
        ctx.strokeStyle = "#ff00ff"; ctx.lineWidth = 2;
        ctx.strokeRect(o.x, 0, o.w, o.top);
        ctx.strokeRect(o.x, o.bottom, o.w, canvas.height - o.bottom);
        ctx.shadowBlur = 0;
    });

    ctx.save();
    ctx.translate(robot.x + robot.w/2, robot.y + robot.h/2);
    ctx.rotate(robot.velY * 0.05);
    ctx.fillStyle = "#00f2ff"; ctx.font = "bold 10px Orbitron"; ctx.textAlign = "center";
    ctx.fillText(customRobotName.toUpperCase(), 0, -25);
    ctx.fillStyle = "#00f2ff"; ctx.beginPath(); ctx.roundRect(-22, 10, 44, 7, 5); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.fillRect(-12, -18, 24, 28);
    ctx.fillStyle = "#000"; ctx.fillRect(-8, -12, 16, 10);
    ctx.restore();
    
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
