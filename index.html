<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Robot Skater Pro</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Arial Black', sans-serif; touch-action: manipulation; }
        canvas { display: block; margin: 0 auto; background: #000; }
        #ui { position: absolute; top: 10px; left: 20px; color: #00ffcc; font-size: 24px; text-shadow: 2px 2px #000; }
        
        /* Overlay for Countdown and Revive */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.7); color: white; z-index: 10;
        }
        #countdownText { font-size: 80px; color: #ff00ff; }
        .menu-btn {
            padding: 15px 40px; font-size: 25px; border: none; border-radius: 50px;
            cursor: pointer; margin: 10px; font-weight: bold; text-transform: uppercase;
        }
        #reviveBtn { background: #00ffcc; color: #000; display: none; box-shadow: 0 0 20px #00ffcc; }
        #restartBtn { background: #ff00ff; color: #fff; display: none; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="scoreVal">0</span></div>
    
    <div id="overlay">
        <div id="countdownText">READY?</div>
        <button id="reviveBtn" class="menu-btn">REVIVE</button>
        <button id="restartBtn" class="menu-btn" onclick="location.reload()">RESTART</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const countdownText = document.getElementById("countdownText");
const overlay = document.getElementById("overlay");
const reviveBtn = document.getElementById("reviveBtn");
const restartBtn = document.getElementById("restartBtn");

canvas.width = window.innerWidth > 800 ? 800 : window.innerWidth;
canvas.height = 400;

let score = 0;
let gameActive = false;
let obstacles = [];
let frameCount = 0;

const robot = {
    x: 50, y: 300, width: 40, height: 40, dy: 0,
    jumpForce: 13, gravity: 0.6, grounded: false
};

// --- 1. COUNTDOWN LOGIC (3, 2, 1) ---
function startCountdown() {
    let count = 3;
    overlay.style.display = "flex";
    reviveBtn.style.display = "none";
    restartBtn.style.display = "none";
    
    let timer = setInterval(() => {
        countdownText.innerText = count;
        if(count === 0) {
            clearInterval(timer);
            overlay.style.display = "none";
            gameActive = true;
            update();
        }
        count--;
    }, 1000);
}

// --- 2. REVIVE LOGIC ---
function revive() {
    obstacles = []; // Saare dushman saaf
    robot.y = 300;
    robot.dy = 0;
    overlay.style.display = "none";
    gameActive = true;
    update(); // Game phir se shuru
}

reviveBtn.addEventListener("click", revive);
reviveBtn.addEventListener("touchstart", (e) => { e.preventDefault(); revive(); });

function drawRobot() {
    if (!robot.grounded) {
        ctx.fillStyle = "cyan";
        for(let i=0; i<5; i++) {
            ctx.beginPath();
            ctx.arc(robot.x-10, robot.y+35+(Math.random()*10), Math.random()*6, 0, Math.PI*2);
            ctx.fill();
        }
    }
    // Skateboard
    ctx.fillStyle = "#333";
    ctx.fillRect(robot.x-10, robot.y+35, 60, 8);
    ctx.fillStyle = "#ff00ff";
    ctx.beginPath();
    ctx.arc(robot.x, robot.y+43, 5, 0, Math.PI*2);
    ctx.arc(robot.x+40, robot.y+43, 5, 0, Math.PI*2);
    ctx.fill();
    // Body
    ctx.fillStyle = "#888";
    ctx.fillRect(robot.x, robot.y, 40, 35);
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(robot.x+20, robot.y+8, 20, 6);
}

function update() {
    if (!gameActive) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    robot.y += robot.dy;
    if (robot.y + robot.height < 350) {
        robot.dy += robot.gravity;
        robot.grounded = false;
    } else {
        robot.y = 350 - robot.height;
        robot.dy = 0;
        robot.grounded = true;
    }

    // Floor line
    ctx.strokeStyle = "#444";
    ctx.beginPath(); ctx.moveTo(0, 358); ctx.lineTo(canvas.width, 358); ctx.stroke();

    drawRobot();

    if (frameCount % 100 === 0) {
        obstacles.push({ x: canvas.width, y: 325, w: 25, h: 25 });
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= 6;
        ctx.fillStyle = "red";
        ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].w, obstacles[i].h);

        // Collision Check
        if (robot.x < obstacles[i].x + obstacles[i].w && 
            robot.x + 40 > obstacles[i].x &&
            robot.y < obstacles[i].y + obstacles[i].h && 
            robot.y + 40 > obstacles[i].y) {
            
            gameActive = false;
            countdownText.innerText = "CRASHED!";
            overlay.style.display = "flex";
            reviveBtn.style.display = "block";
            restartBtn.style.display = "block";
        }

        if (obstacles[i].x < -30) {
            obstacles.splice(i, 1);
            score++;
            document.getElementById("scoreVal").innerText = score;
        }
    }
    requestAnimationFrame(update);
}

// Jump Event
function jump() { if(robot.grounded && gameActive) robot.dy = -robot.jumpForce; }
window.addEventListener("keydown", (e) => { if(e.code === "Space") jump(); });
window.addEventListener("touchstart", (e) => { if(e.target.tagName !== 'BUTTON') jump(); });

// Start the game with countdown
startCountdown();
</script>
</body>
</html>
