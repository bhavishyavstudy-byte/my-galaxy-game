<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Skater Robot</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; background: linear-gradient(to bottom, #121212, #222); }
        #ui { position: absolute; top: 10px; left: 10px; color: #00ffcc; font-weight: bold; font-size: 20px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameSpeed = 5;
let particles = [];

// Robot/Player Object
const robot = {
    x: 100,
    y: canvas.height - 150,
    width: 50,
    height: 60,
    dy: 0,
    jumpForce: 15,
    gravity: 0.8,
    grounded: false,
    color: "#00ffcc"
};

// Thrust Particles logic
class Particle {
    constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 5 + 2;
        this.speedX = Math.random() * -3 - 1;
        this.speedY = Math.random() * 2 - 1;
        this.color = `hsla(${Math.random() * 30 + 180}, 100%, 50%, 0.8)`; // Cyan/Blue thrust
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.size > 0.2) this.size -= 0.1;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function drawRobot() {
    // 1. SKATEBOARD (The Base)
    ctx.fillStyle = "#333";
    ctx.roundRect(robot.x - 5, robot.y + 45, 60, 10, 5); // Board deck
    ctx.fill();
    
    // Glowing Wheels
    ctx.fillStyle = "#ff00ff"; // Neon Pink wheels
    ctx.beginPath();
    ctx.arc(robot.x + 5, robot.y + 55, 6, 0, Math.PI * 2);
    ctx.arc(robot.x + 45, robot.y + 55, 6, 0, Math.PI * 2);
    ctx.fill();

    // 2. ROBOT BODY (Metallic Look)
    ctx.fillStyle = "#888"; 
    ctx.fillRect(robot.x + 5, robot.y, 40, 45); 
    
    // 3. NEON VISOR (The Eyes)
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#00ffff";
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(robot.x + 25, robot.y + 10, 20, 8);
    ctx.shadowBlur = 0; // Reset shadow

    // 4. THRUST EFFECT (Back of the board)
    if (!robot.grounded || Math.random() > 0.5) {
        particles.push(new Particle(robot.x - 5, robot.y + 50));
    }
}

function handleParticles() {
    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].size <= 0.3) {
            particles.splice(i, 1);
            i--;
        }
    }
}

// Simple Physics
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Gravity logic
    robot.y += robot.dy;
    if (robot.y + robot.height < canvas.height - 50) {
        robot.dy += robot.gravity;
        robot.grounded = false;
    } else {
        robot.y = canvas.height - 50 - robot.height;
        robot.dy = 0;
        robot.grounded = true;
    }

    handleParticles();
    drawRobot();

    // Floor Line
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height - 50);
    ctx.lineTo(canvas.width, canvas.height - 50);
    ctx.stroke();

    requestAnimationFrame(update);
}

// Controls
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && robot.grounded) {
        robot.dy = -robot.jumpForce;
    }
});

update();
</script>
</body>
</html>
