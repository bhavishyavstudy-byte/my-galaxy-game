<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Skateboard Game</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #111; margin: 0 auto; }
        #scoreBoard { position: absolute; top: 10px; left: 20px; color: white; font-size: 24px; }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = 800;
canvas.height = 400;

let score = 0;
let gameActive = true;

// Player/Robot Object
const robot = {
    x: 50,
    y: 300,
    width: 40,
    height: 40,
    dy: 0,
    jumpForce: 12,
    gravity: 0.6,
    grounded: false
};

// Obstacles
let obstacles = [];
let frameCount = 0;

function createObstacle() {
    if (frameCount % 100 === 0) {
        obstacles.push({
            x: canvas.width,
            y: 320,
            width: 30,
            height: 30,
            color: "#ff4444"
        });
    }
}

function drawRobot() {
    // --- THRUST EFFECT (Unique Cyan Smoke) ---
    if (!robot.grounded) {
        ctx.fillStyle = "rgba(0, 255, 255, 0.5)";
        for(let i = 0; i < 5; i++) {
            ctx.beginPath();
            ctx.arc(robot.x - 5, robot.y + 35 + (Math.random() * 10), Math.random() * 6, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // --- SKATEBOARD (The Base) ---
    ctx.fillStyle = "#333";
    ctx.fillRect(robot.x - 10, robot.y + 35, 60, 8); // Board deck
    
    // Wheels (Neon Pink)
    ctx.fillStyle = "#ff00ff";
    ctx.beginPath();
    ctx.arc(robot.x, robot.y + 43, 5, 0, Math.PI * 2);
    ctx.arc(robot.x + 40, robot.y + 43, 5, 0, Math.PI * 2);
    ctx.fill();

    // --- ROBOT BODY (Original Square Look) ---
    ctx.fillStyle = "#888"; 
    ctx.fillRect(robot.x, robot.y, 40, 35); // Body
    
    // Visor (Neon Cyan)
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(robot.x + 20, robot.y + 8, 20, 6); 
}

function update() {
    if (!gameActive) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    // Gravity & Movement
    robot.y += robot.dy;
    if (robot.y + robot.height < 350) {
        robot.dy += robot.gravity;
        robot.grounded = false;
    } else {
        robot.y = 350 - robot.height;
        robot.dy = 0;
        robot.grounded = true;
    }

    // Draw Floor
    ctx.strokeStyle = "#555";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 350 + 8);
    ctx.lineTo(canvas.width, 350 + 8);
    ctx.stroke();

    drawRobot();
    createObstacle();

    // Obstacle Logic
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= 5;
        ctx.fillStyle = obstacles[i].color;
        ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);

        // Collision Check
        if (
            robot.x < obstacles[i].x + obstacles[i].width &&
            robot.x + 40 > obstacles[i].x &&
            robot.y < obstacles[i].y + obstacles[i].height &&
            robot.y + 40 > obstacles[i].y
        ) {
            gameActive = false;
            alert("Game Over! Score: " + score);
            location.reload();
        }

        if (obstacles[i].x + obstacles[i].width < 0) {
            obstacles.splice(i, 1);
            score++;
            document.getElementById("scoreBoard").innerText = "Score: " + score;
        }
    }

    requestAnimationFrame(update);
}

// Jump Control
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && robot.grounded) {
        robot.dy = -robot.jumpForce;
    }
});

update();
</script>
</body>
</html>
