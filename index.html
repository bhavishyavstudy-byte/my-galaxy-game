<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Skateboard Game</title>
    <style>
        body { margin: 0; background: #222; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; background: #111; margin: 0 auto; }
        #scoreBoard { position: absolute; top: 10px; left: 20px; color: white; font-size: 24px; }
        
        /* Countdown Overlay */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.6); z-index: 10;
        }
        #msg { font-size: 100px; color: #ff00ff; font-weight: bold; }
        #reviveBtn { 
            display: none; padding: 15px 30px; font-size: 20px; 
            background: #00ffcc; border: none; border-radius: 10px; cursor: pointer; 
        }
    </style>
</head>
<body>
    <div id="scoreBoard">Score: 0</div>
    
    <div id="overlay">
        <div id="msg">3</div>
        <button id="reviveBtn">REVIVE PLAYER</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const msgDisplay = document.getElementById("msg");
const overlay = document.getElementById("overlay");
const reviveBtn = document.getElementById("reviveBtn");

canvas.width = 800;
canvas.height = 400;

let score = 0;
let gameActive = false; // Start false for countdown
let obstacles = [];
let frameCount = 0;

const robot = {
    x: 50, y: 300, width: 40, height: 40, dy: 0,
    jumpForce: 12, gravity: 0.6, grounded: false
};

// --- 1. COUNTDOWN SYSTEM (3 2 1) ---
function startCountdown() {
    let count = 3;
    gameActive = false;
    overlay.style.display = "flex";
    reviveBtn.style.display = "none";
    msgDisplay.style.display = "block";
    
    let timer = setInterval(() => {
        msgDisplay.innerText = count;
        if(count === 0) {
            clearInterval(timer);
            overlay.style.display = "none";
            gameActive = true;
            update();
        }
        count--;
    }, 1000);
}

// --- 2. FIX REVIVE ERROR (No more sticking) ---
reviveBtn.onclick = () => {
    obstacles = []; // Rasta saaf karo
    robot.y = 300; 
    robot.dy = 0;
    startCountdown(); // Revive ke baad phir se 3 2 1
};

function drawRobot() {
    if (!robot.grounded) {
        ctx.fillStyle = "cyan";
        for(let i=0; i<3; i++) {
            ctx.beginPath();
            ctx.arc(robot.x-5, robot.y+35+(Math.random()*8), 5, 0, Math.PI*2);
            ctx.fill();
        }
    }
    // Skateboard
    ctx.fillStyle = "#333";
    ctx.fillRect(robot.x-10, robot.y+35, 60, 8);
    ctx.fillStyle = "#ff00ff";
    ctx.beginPath();
    ctx.arc(robot.x, robot.y+43, 5, 0, Math.PI*2);
    ctx.arc(robot.x+40, robot.y+43, 5, 0, Math.PI*2);
    ctx.fill();
    // Robot Body
    ctx.fillStyle = "#888";
    ctx.fillRect(robot.x, robot.y, 40, 35);
    ctx.fillStyle = "#00ffff";
    ctx.fillRect(robot.x+20, robot.y+8, 20, 6);
}

function update() {
    if (!gameActive) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    robot.y += robot.dy;
    if (robot.y + robot.height < 350) {
        robot.dy += robot.gravity;
        robot.grounded = false;
    } else {
        robot.y = 350 - robot.height;
        robot.dy = 0;
        robot.grounded = true;
    }

    drawRobot();

    if (frameCount % 100 === 0) {
        obstacles.push({ x: canvas.width, y: 325, w: 25, h: 25 });
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= 6;
        ctx.fillStyle = "red";
        ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].w, obstacles[i].h);

        // COLLISION CHECK
        if (robot.x < obstacles[i].x + obstacles[i].w && 
            robot.x + 40 > obstacles[i].x &&
            robot.y < obstacles[i].y + obstacles[i].h && 
            robot.y + 40 > obstacles[i].y) {
            
            // Player mar gaya
            gameActive = false;
            overlay.style.display = "flex";
            msgDisplay.style.display = "none";
            reviveBtn.style.display = "block"; // Revive button dikhao
            return; 
        }

        if (obstacles[i].x < -30) {
            obstacles.splice(i, 1);
            score++;
            document.getElementById("scoreBoard").innerText = "Score: " + score;
        }
    }
    requestAnimationFrame(update);
}

window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && robot.grounded && gameActive) {
        robot.dy = -robot.jumpForce;
    }
});

// Start pehli baar
startCountdown();
</script>
</body>
</html>
