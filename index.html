<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Galaxy Rocket Surfer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { box-sizing: border-box; touch-action: manipulation; }
        body { margin: 0; overflow: hidden; background: #02020a; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Orbitron', sans-serif; }
        canvas { max-width: 100vw; max-height: 100vh; border: 2px solid #00f2ff; box-shadow: 0 0 30px rgba(0, 242, 255, 0.2); border-radius: 10px; background: #000; }
        .overlay { position: absolute; width: 100%; max-width: 400px; height: 100%; max-height: 600px; background: radial-gradient(circle, rgba(0,20,40,0.98) 0%, rgba(2,2,10,1) 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; color: white; padding: 20px; }
        .logo-wrap { position: relative; width: 120px; height: 120px; margin-bottom: 10px; animation: float 4s ease-in-out infinite; }
        .rocket-icon { width: 70px; height: 40px; position: absolute; top: 40px; left: 25px; }
        .rocket-icon::before { content: ''; position: absolute; width: 50px; height: 20px; background: linear-gradient(90deg, #ff00ff, #00f2ff); border-radius: 50% 20% 20% 50%; top: 10px; left: 0; box-shadow: 0 0 20px #ff00ff; }
        .rocket-icon::after { content: ''; position: absolute; width: 25px; height: 15px; background: linear-gradient(90deg, #ffaa00, #ff4400); bottom: 2px; left: -20px; border-radius: 50% 0 0 50%; animation: flame 0.3s infinite alternate; }
        @keyframes flame { 0% { transform: scaleX(1); } 100% { transform: scaleX(1.3); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        h1 { font-size: 26px; margin: 5px 0; color: #00f2ff; text-shadow: 0 0 15px #00f2ff; }
        .developer-tag { font-size: 10px; letter-spacing: 3px; color: #ff00ff; margin-bottom: 20px; font-weight: 900; text-shadow: 0 0 10px #ff00ff; }
        .btn { background: #00f2ff; color: #000; padding: 12px 0; border: none; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; margin: 5px; border-radius: 8px; transition: 0.3s; font-size: 13px; width: 85%; max-width: 220px; box-shadow: 0 4px 0 #008ba3; }
        .btn:active { transform: translateY(3px); box-shadow: none; }
        .btn-ready { background: linear-gradient(135deg, #ff00ff, #00f2ff); color: #fff; padding: 15px 0; font-size: 18px; box-shadow: 0 4px 0 #8b008b, 0 0 25px rgba(255, 0, 255, 0.6); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn-ready:hover { box-shadow: 0 4px 0 #8b008b, 0 0 40px rgba(255, 0, 255, 0.9); }
        #robot-name-input { background: rgba(255,255,255,0.05); border: 2px solid #ff00ff; color: #fff; padding: 12px; font-family: 'Orbitron'; text-align: center; border-radius: 8px; width: 80%; max-width: 210px; font-size: 16px; margin-bottom: 15px; }
        #score-ui { position: absolute; top: 15px; color: #00f2ff; font-size: 28px; font-weight: 900; z-index: 5; text-shadow: 0 0 15px #00f2ff; }
        #highscore-ui { position: absolute; top: 50px; color: #ff00ff; font-size: 12px; font-weight: 900; z-index: 5; text-shadow: 0 0 5px #ff00ff; }
        #rank-ui { position: absolute; top: 70px; color: #ffd700; font-size: 14px; font-weight: 700; z-index: 5; text-shadow: 0 0 10px #ffd700; padding: 3px 12px; border: 1px solid; border-radius: 15px; }
        .rank-box { background: rgba(0,0,0,0.4); border: 1px solid #00f2ff; border-radius: 12px; padding: 15px; margin-top: 15px; }
        .rank-title { color: #00f2ff; font-size: 11px; margin-bottom: 8px; letter-spacing: 2px; }
        .rank-item { font-size: 12px; margin: 5px 0; padding: 5px 10px; border-radius: 5px; }
        .rank-beginner { color: #aaa; background: rgba(170,170,170,0.1); }
        .rank-pro { color: #00f2ff; background: rgba(0,242,255,0.1); }
        .rank-legend { color: #ffd700; background: rgba(255,215,0,0.1); }
        .tip-text { font-size: 10px; color: #888; margin-top: 10px; font-style: italic; }
    </style>
<base target="_blank">
</head>
<body>

    <div id="start-screen" class="overlay">
        <div class="logo-wrap"><div class="rocket-icon"></div></div>
        <h1>ROCKET SURFER</h1>
        <div class="developer-tag">BY BHAVISHYA KUMAR</div>
        <input type="text" id="robot-name-input" maxlength="12" placeholder="ENTER YOUR NAME">
        <button class="btn btn-ready" onclick="startGame()">READY TO PLAY</button>
        <div class="rank-box">
            <div class="rank-title">RANKS</div>
            <div class="rank-item rank-beginner">BEGINNER (0-9 pts)</div>
            <div class="rank-item rank-pro">PRO (10-24 pts)</div>
            <div class="rank-item rank-legend">LEGEND (25+ pts)</div>
        </div>
        <div class="tip-text">Tap or press SPACE to fly!</div>
    </div>

    <div id="death-screen" class="overlay" style="display: none;">
        <h2 style="color:#00ff88; text-shadow: 0 0 15px #00ff88; font-size: 22px;">YOU CAN DO IT!</h2>
        <p style="font-size: 14px; margin: 5px 0;">SCORE: <span id="current-score-text" style="color:#00f2ff; font-size: 24px; font-weight: 900;">0</span></p>
        <p style="font-size: 11px; color: #aaa;">BEST: <span id="best-score-text">0</span></p>
        <p id="final-rank" style="font-size: 16px; margin: 10px 0; font-weight: 700;"></p>
        <div id="menu-buttons">
            <button id="revive-btn" class="btn" style="background:#ff00ff; color:white; box-shadow: 0 5px 0 #b300b3;" onclick="startAdTimer()">REVIVE (AD)</button>
            <button class="btn" onclick="hardReset()">TRY AGAIN</button>
            <button class="btn" style="background:#222; color:#00f2ff;" onclick="goToMainMenu()">MENU</button>
        </div>
        <div id="ad-box" style="display:none">
            <p>REBOOTING SYSTEMS...</p>
            <div id="timer-num" style="font-size: 40px; color: #fff;">3</div>
        </div>
    </div>

    <div id="score-ui">000</div>
    <div id="highscore-ui">BEST: 000</div>
    <div id="rank-ui">BEGINNER</div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const startScreen = document.getElementById("start-screen");
const deathScreen = document.getElementById("death-screen");
const menuButtons = document.getElementById("menu-buttons");
const adBox = document.getElementById("ad-box");
const nameInput = document.getElementById("robot-name-input");
const rankUI = document.getElementById("rank-ui");

canvas.width = 400;
canvas.height = 600;

let customRobotName = localStorage.getItem("rocketSurferName") || "Player";
let highScore = localStorage.getItem("rocketSurferHighScore") || 0;
nameInput.value = customRobotName;
document.getElementById("highscore-ui").innerText = "BEST: " + highScore.toString().padStart(3, '0');

// Simple, relaxing difficulty
let gravity = 0.18;
let jump = -4.8;
let gapSize = 200;
let spawnRate = 110;

let robot = { x: 70, y: 250, w: 55, h: 35, velY: 0, trail: [], thrustActive: 0, floatAnim: 0 };
let obstacles = [], stars = [], nebula = [], frame = 0, score = 0, gameOver = false, gameRunning = false, canRevive = true, shake = 0;

// Simple 3-rank system
const ranks = [
    { min: 0, name: "BEGINNER", color: "#aaa" },
    { min: 10, name: "PRO", color: "#00f2ff" },
    { min: 25, name: "LEGEND", color: "#ffd700" }
];

// Create relaxing background
for(let i=0; i<80; i++) stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2.5, s: Math.random()*0.8 + 0.2, twinkle: Math.random() });
for(let i=0; i<4; i++) nebula.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: 100+Math.random()*120, s: 0.15+Math.random()*0.2, hue: Math.random() > 0.5 ? 280 : 180 });

// Crash sound effect
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playCrashSound() {
    try {
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        oscillator.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.4);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(800, audioCtx.currentTime);
        filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        
        gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.4);
    } catch(e) {}
}

function getRankForScore(s) {
    for(let i = ranks.length - 1; i >= 0; i--) {
        if(s >= ranks[i].min) return ranks[i];
    }
    return ranks[0];
}

function updateRankDisplay() {
    let currentRank = getRankForScore(score);
    rankUI.innerText = currentRank.name;
    rankUI.style.color = currentRank.color;
    rankUI.style.borderColor = currentRank.color;
    rankUI.style.boxShadow = "0 0 10px " + currentRank.color;
}

function updateDifficulty() {
    let progress = Math.min(score / 50, 1);
    gapSize = 200 - (progress * 35);
    spawnRate = Math.floor(110 - (progress * 20));
}

function startGame() {
    customRobotName = nameInput.value.trim() || "Player";
    localStorage.setItem("rocketSurferName", customRobotName);
    startScreen.style.display = "none";
    gameRunning = true;
    hardReset();
}

function goToMainMenu() { deathScreen.style.display = "none"; startScreen.style.display = "flex"; gameRunning = false; }

function handleInput(e) {
    if (!gameRunning || gameOver) return;
    if (e.cancelable) e.preventDefault();
    robot.velY = jump;
    robot.thrustActive = 20;
}

window.addEventListener("keydown", (e) => { if(e.code === "Space") handleInput(e); });
canvas.addEventListener("touchstart", handleInput, {passive: false});
canvas.addEventListener("mousedown", handleInput);

function triggerGameOver() {
    if (gameOver) return;
    gameOver = true;
    shake = 12;
    playCrashSound();
    
    if (score > highScore) {
        highScore = score;
        localStorage.setItem("rocketSurferHighScore", highScore);
        document.getElementById("highscore-ui").innerText = "BEST: " + highScore.toString().padStart(3, '0');
    }
    document.getElementById("current-score-text").innerText = score;
    document.getElementById("best-score-text").innerText = highScore;
    
    let rank = getRankForScore(score);
    let finalRankEl = document.getElementById("final-rank");
    finalRankEl.innerText = rank.name;
    finalRankEl.style.color = rank.color;
    finalRankEl.style.textShadow = "0 0 10px " + rank.color;
    
    deathScreen.style.display = "flex";
    menuButtons.style.display = "block";
    adBox.style.display = "none";
    document.getElementById("revive-btn").style.display = (canRevive && score > 0) ? "inline-block" : "none";
}

function startAdTimer() {
    menuButtons.style.display = "none"; adBox.style.display = "block";
    let t = 3; document.getElementById("timer-num").innerText = t;
    let inv = setInterval(() => {
        t--; document.getElementById("timer-num").innerText = t;
        if(t <= 0) { clearInterval(inv); revivePlayer(); }
    }, 1000);
}

function revivePlayer() {
    deathScreen.style.display = "none";
    robot.y = 250; robot.velY = 0; obstacles = []; gameOver = false; canRevive = false; 
}

function hardReset() {
    deathScreen.style.display = "none";
    score = 0; 
    document.getElementById("score-ui").innerText = "000";
    robot.y = 250; robot.velY = 0; robot.trail = []; obstacles = []; frame = 0; gameOver = false; canRevive = true;
    gapSize = 200; spawnRate = 110;
    updateRankDisplay();
}

function update() {
    if(!gameRunning || gameOver) return;
    robot.velY += gravity;
    robot.y += robot.velY;
    robot.floatAnim += 0.1;
    
    // Add rocket trail particles
    if(frame % 2 === 0) {
        robot.trail.push({x: robot.x - 5, y: robot.y + 15, life: 1, size: 4 + Math.random() * 4});
    }
    robot.trail.forEach(t => { t.life -= 0.04; t.x -= 3; });
    robot.trail = robot.trail.filter(t => t.life > 0);
    
    if(robot.thrustActive > 0) robot.thrustActive--;
    
    if(frame % spawnRate === 0) {
        let pos = Math.random() * (canvas.height - gapSize - 120) + 60;
        obstacles.push({ x: canvas.width, top: pos, bottom: pos + gapSize, w: 55, passed: false });
    }
    
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let speed = 2.2 + (score * 0.015);
        obstacles[i].x -= speed;
        
        if(robot.x + 6 < obstacles[i].x + obstacles[i].w && 
           robot.x + robot.w - 6 > obstacles[i].x && 
           (robot.y + 8 < obstacles[i].top || robot.y + robot.h - 8 > obstacles[i].bottom)) {
            triggerGameOver();
        }
        
        if(!obstacles[i].passed && obstacles[i].x < robot.x) { 
            score++; 
            obstacles[i].passed = true; 
            document.getElementById("score-ui").innerText = score.toString().padStart(3, '0');
            updateDifficulty();
            updateRankDisplay();
        }
        if(obstacles[i].x + obstacles[i].w < -50) obstacles.splice(i, 1);
    }
    
    if(robot.y + robot.h > canvas.height || robot.y < -40) triggerGameOver();
    if(shake > 0) shake--;
    frame++;
}

function drawRocketFlame(x, y, velY) {
    // Flame direction based on velocity (gravity)
    let flameLength = 30 + Math.random() * 15;
    let flameSpread = 8 + Math.random() * 4;
    
    ctx.save();
    ctx.translate(x, y);
    
    // Outer flame (red/orange)
    let outerGrad = ctx.createRadialGradient(0, 0, 0, -flameLength, 0, flameSpread * 2);
    outerGrad.addColorStop(0, '#ffff00');
    outerGrad.addColorStop(0.2, '#ff8800');
    outerGrad.addColorStop(0.5, '#ff2200');
    outerGrad.addColorStop(1, 'transparent');
    
    ctx.fillStyle = outerGrad;
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff4400";
    ctx.beginPath();
    ctx.moveTo(0, -flameSpread/2);
    ctx.quadraticCurveTo(-flameLength/2, -flameSpread, -flameLength, 0);
    ctx.quadraticCurveTo(-flameLength/2, flameSpread, 0, flameSpread/2);
    ctx.closePath();
    ctx.fill();
    
    // Inner flame (white/yellow core)
    let innerGrad = ctx.createRadialGradient(0, 0, 0, -flameLength * 0.6, 0, flameSpread);
    innerGrad.addColorStop(0, '#ffffff');
    innerGrad.addColorStop(0.3, '#ffff88');
    innerGrad.addColorStop(0.7, '#ffaa00');
    innerGrad.addColorStop(1, 'transparent');
    
    ctx.fillStyle = innerGrad;
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ffaa00";
    ctx.beginPath();
    ctx.moveTo(0, -flameSpread/3);
    ctx.quadraticCurveTo(-flameLength/3, -flameSpread/2, -flameLength * 0.6, 0);
    ctx.quadraticCurveTo(-flameLength/3, flameSpread/2, 0, flameSpread/3);
    ctx.closePath();
    ctx.fill();
    
    // Spark particles
    for(let i = 0; i < 5; i++) {
        let sparkX = -Math.random() * flameLength;
        let sparkY = (Math.random() - 0.5) * flameSpread * 1.5;
        let sparkSize = Math.random() * 2 + 1;
        ctx.fillStyle = `rgba(255, ${150 + Math.random() * 105}, 0, ${Math.random()})`;
        ctx.beginPath();
        ctx.arc(sparkX, sparkY, sparkSize, 0, Math.PI * 2);
        ctx.fill();
    }
    
    ctx.restore();
}

function drawEyeFlame(x, y, velY) {
    // Yellow flames from eyes that react to gravity
    let flameDir = velY > 0 ? -1 : 1; // Point opposite to velocity
    let flameLength = 8 + Math.abs(velY) * 1.5;
    
    ctx.save();
    ctx.translate(x, y);
    
    // Yellow flame gradient
    let flameGrad = ctx.createLinearGradient(0, 0, 0, flameLength * flameDir);
    flameGrad.addColorStop(0, '#ffff00');
    flameGrad.addColorStop(0.5, '#ffcc00');
    flameGrad.addColorStop(1, 'transparent');
    
    ctx.fillStyle = flameGrad;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ffff00";
    
    ctx.beginPath();
    ctx.moveTo(-2, 0);
    ctx.quadraticCurveTo(-3, flameLength * flameDir * 0.5, 0, flameLength * flameDir);
    ctx.quadraticCurveTo(3, flameLength * flameDir * 0.5, 2, 0);
    ctx.closePath();
    ctx.fill();
    
    ctx.restore();
}

function draw() {
    ctx.save();
    if(shake > 0) ctx.translate(Math.random()*shake - shake/2, Math.random()*shake - shake/2);
    
    // Dark space background
    let bgGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    bgGrad.addColorStop(0, '#050510');
    bgGrad.addColorStop(1, '#0a0a20');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw nebula clouds
    nebula.forEach(n => {
        n.x -= n.s; 
        if(n.x + n.r < 0) n.x = canvas.width + n.r;
        let grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
        grd.addColorStop(0, `hsla(${n.hue}, 80%, 50%, 0.08)`);
        grd.addColorStop(0.5, `hsla(${n.hue}, 60%, 40%, 0.04)`);
        grd.addColorStop(1, 'transparent');
        ctx.fillStyle = grd; 
        ctx.beginPath(); 
        ctx.arc(n.x, n.y, n.r, 0, Math.PI*2); 
        ctx.fill();
    });

    // Draw twinkling stars
    stars.forEach(s => { 
        s.x -= s.s; 
        if(s.x < 0) s.x = canvas.width;
        s.twinkle += 0.05;
        let alpha = 0.4 + Math.sin(s.twinkle) * 0.4;
        ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
        ctx.fill();
    });

    if(!gameRunning) { ctx.restore(); requestAnimationFrame(draw); return; }

    // Draw obstacles
    obstacles.forEach(o => {
        ctx.fillStyle = "rgba(0, 242, 255, 0.1)";
        ctx.fillRect(o.x, 0, o.w, o.top);
        ctx.fillRect(o.x, o.bottom, o.w, canvas.height - o.bottom);
        ctx.strokeStyle = "#00f2ff"; 
        ctx.lineWidth = 2;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "#00f2ff";
        ctx.strokeRect(o.x, 0, o.w, o.top);
        ctx.strokeRect(o.x, o.bottom, o.w, canvas.height - o.bottom);
        ctx.shadowBlur = 0;
    });

    // === DRAW HORIZONTAL ROCKET WITH ROBOT ===
    ctx.save();
    let hoverY = Math.sin(robot.floatAnim) * 2;
    ctx.translate(robot.x + robot.w/2, robot.y + robot.h/2 + hoverY);
    ctx.rotate(robot.velY * 0.03);

    // Robot Name
    ctx.fillStyle = "#00f2ff"; 
    ctx.font = "900 10px Orbitron"; 
    ctx.textAlign = "center";
    ctx.fillText(customRobotName.toUpperCase(), 0, -45);

    // === ROCKET FLAMES (from back of rocket) ===
    drawRocketFlame(-35, 0, robot.velY);

    // === HORIZONTAL ROCKET BODY ===
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ff00ff";
    
    // Rocket body gradient
    let rocketGrad = ctx.createLinearGradient(-30, -10, 30, 10);
    rocketGrad.addColorStop(0, '#cc00cc');
    rocketGrad.addColorStop(0.3, '#ff00ff');
    rocketGrad.addColorStop(0.6, '#ff66ff');
    rocketGrad.addColorStop(1, '#880088');
    
    // Main rocket body (horizontal cylinder)
    ctx.fillStyle = rocketGrad;
    ctx.beginPath();
    ctx.roundRect(-30, -10, 55, 20, 8);
    ctx.fill();
    
    // Rocket highlight
    ctx.fillStyle = "rgba(255, 255, 255, 0.3)";
    ctx.beginPath();
    ctx.roundRect(-25, -7, 40, 6, 4);
    ctx.fill();
    
    // Rocket nose cone (pointed front)
    ctx.fillStyle = "#00f2ff";
    ctx.shadowColor = "#00f2ff";
    ctx.beginPath();
    ctx.moveTo(25, -10);
    ctx.quadraticCurveTo(45, 0, 25, 10);
    ctx.lineTo(25, -10);
    ctx.fill();
    
    // Rocket fins (top and bottom)
    ctx.fillStyle = "#ff00ff";
    ctx.shadowColor = "#ff00ff";
    // Top fin
    ctx.beginPath();
    ctx.moveTo(-10, -10);
    ctx.lineTo(-5, -22);
    ctx.lineTo(10, -10);
    ctx.closePath();
    ctx.fill();
    // Bottom fin
    ctx.beginPath();
    ctx.moveTo(-10, 10);
    ctx.lineTo(-5, 22);
    ctx.lineTo(10, 10);
    ctx.closePath();
    ctx.fill();
    
    ctx.shadowBlur = 0;

    // === ROBOT RIDER ON TOP OF ROCKET ===
    
    // Robot body
    let bodyGrad = ctx.createLinearGradient(0, -38, 0, -20);
    bodyGrad.addColorStop(0, '#E8E8E8');
    bodyGrad.addColorStop(0.5, '#ffffff');
    bodyGrad.addColorStop(1, '#C0C0C0');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.roundRect(-8, -38, 16, 18, 5);
    ctx.fill();
    
    // Chest glow
    ctx.shadowBlur = 8;
    ctx.shadowColor = "#00f2ff";
    ctx.fillStyle = "#00f2ff";
    ctx.beginPath();
    ctx.arc(0, -30, 3, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    
    // Robot arms (holding rocket)
    ctx.fillStyle = "#C0C0C0";
    ctx.fillRect(-12, -32, 3, 10);
    ctx.fillRect(9, -32, 3, 10);
    ctx.fillStyle = "#888";
    ctx.beginPath(); ctx.arc(-10, -22, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(11, -22, 2.5, 0, Math.PI*2); ctx.fill();

    // Robot head
    let headGrad = ctx.createRadialGradient(-2, -52, 0, 0, -50, 12);
    headGrad.addColorStop(0, '#ffffff');
    headGrad.addColorStop(0.7, '#E8E8E8');
    headGrad.addColorStop(1, '#C0C0C0');
    ctx.fillStyle = headGrad;
    ctx.beginPath();
    ctx.arc(0, -50, 12, 0, Math.PI*2);
    ctx.fill();

    // Face visor
    ctx.fillStyle = "#1a1a2e";
    ctx.beginPath();
    ctx.roundRect(-8, -56, 16, 8, 4);
    ctx.fill();
    
    // === YELLOW FLAMES FROM EYES (based on gravity) ===
    drawEyeFlame(-4, -52, robot.velY);
    drawEyeFlame(4, -52, robot.velY);
    
    // Glowing eyes
    ctx.shadowBlur = 8;
    ctx.shadowColor = "#00f2ff";
    ctx.fillStyle = "#00f2ff";
    ctx.beginPath();
    ctx.arc(-4, -52, 2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(4, -52, 2.5, 0, Math.PI*2);
    ctx.fill();
    
    // Eye shine
    ctx.shadowBlur = 0;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(-5, -53, 1, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(3, -53, 1, 0, Math.PI*2);
    ctx.fill();
    
    // === BLACK CAP WITH "YO" ===
    // Cap base
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.ellipse(0, -58, 14, 6, 0, 0, Math.PI, true);
    ctx.fill();
    
    // Cap dome
    ctx.fillStyle = "#1a1a1a";
    ctx.beginPath();
    ctx.arc(0, -58, 13, Math.PI, 0);
    ctx.fill();
    
    // Cap brim
    ctx.fillStyle = "#111";
    ctx.beginPath();
    ctx.ellipse(8, -56, 10, 4, 0.3, 0, Math.PI*2);
    ctx.fill();
    
    // Cap highlight
    ctx.fillStyle = "#333";
    ctx.beginPath();
    ctx.arc(-5, -65, 3, 0, Math.PI*2);
    ctx.fill();
    
    // "YO" text on cap
    ctx.fillStyle = "#fff";
    ctx.font = "bold 8px Arial";
    ctx.textAlign = "center";
    ctx.fillText("YO", 0, -60);
    
    // Headphones
    ctx.fillStyle = "#ff9900";
    ctx.beginPath();
    ctx.ellipse(-12, -50, 3, 6, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(12, -50, 3, 6, 0, 0, Math.PI*2);
    ctx.fill();

    ctx.restore(); 
    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
